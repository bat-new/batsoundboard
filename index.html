<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAT SOUND V1.0</title>
  <style>
    body { font-family: Arial, sans-serif; background: #222; color: #fff; text-align: center; padding: 20px; }
    .soundboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }
    button { 
      padding: 20px; 
      font-size: 18px; 
      background: #444; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #167; transform: scale(1.05); }
    button:active { background: #0a0; }
  </style>
</head>
<body>
  <h1>Bat's Soundboard</h1>
  <h3>version 1.0</h3>
  <div class="soundboard">
    <button data-sound="batsbv1earpierces1.mp3">Ear Piercing Sound</button>
  </div>

  <script>
    const buttons = document.querySelectorAll('button');
    
    buttons.forEach(button => {
      button.addEventListener('click', () => {
        const soundUrl = button.getAttribute('data-sound');
        
        // <audio>
        const audio = new Audio(soundUrl);
        audio.play();
        
        // Visual FB
        button.style.background = '#0f0';
        setTimeout(() => button.style.background = '#444', 200);
      });
    });
  </script>
</body>
</html>
