<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Condiment&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAT SOUND V1.0</title>
  <style>
    body { font-family: 'Condiment'; background: #222; color: #ff00ff; text-align: center; padding: 20px; }
    .soundboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }
    .condiment-regular {
    font-family: "Condiment", cursive;
    font-weight: 300;
    font-style: normal;
    letter-spacing: normal;
    }

    button { 
      padding: 20px; 
      font-size: 18px; 
      background: #000; 
      color: #ff00ff; 
      border: #ff00ff; 
      border-radius: 18px; 
      border-style: solid;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #313131; transform: scale(1.05); }
    button:active { background: #5f005f; }
  </style>
</head>
<body>
  <h1>Bat's Soundboard</h1>
  <h3>version 1.2</h3>
  <div class="soundboard">
    <button data-sound="batsbv1earpierces1.wav">Ear Piercer</button>
    <button data-sound="batsbv1bruhs2.wav">Bruh</button>
    <button data-sound="batsbv1vinebooms3.wav">Vine Boom</button>
    <button data-sound="batsbv1GetOut.mp3">Get Out</button>
    <button data-sound="batsbv1fartmemesfxs4.wav">Fart SFX</button>
    <button data-sound="batsbv1huhs6.wav">Huh</button>
    <button data-sound="batsbv1quandaledingles12.wav">Aughhh</button>
    <button data-sound="batsbv1mimimisnorings5.wav">Mimimi</button>
    <button data-sound="batsbv1ohhmygods10.wav">Ohh my God</button>
    <button data-sound="batsbv1funnymemelaughohnonos14.wav">Funny Laugh</button>
    <button data-sound="batsbv1loudexplosions7.wav">Explosion</button>
    <button data-sound="batsbv1yayyys8.wav">Yayyy</button>
    <button data-sound="batsbv1babylaughs11.wav">Baby Laugh</button>
    <button data-sound="batsbv1impostorreveals9.wav">Impostor Reveal</button>
    <button data-sound="batsbv1trainhorns13.wav">Train Horn</button>
  </div>

  <script>
    const buttons = document.querySelectorAll('button');
    
    buttons.forEach(button => {
      button.addEventListener('click', () => {
        const soundUrl = button.getAttribute('data-sound');
        
        // <audio>
        const audio = new Audio(soundUrl);
        audio.play();
        
        // Visual FB
        button.style.background = '#0f0';
        setTimeout(() => button.style.background = '#444', 200);
      });
    });
  </script>
</body>
</html>
